#############
#  Sources  #
##############

# TokyoNight Night Theme
source = ~/.config/hypr/tokyonight-night.conf

# Monitor configs (Not tracked)
source = ~/.config/hypr/monitors.conf

# Environment variables for the hyprland session
source = ~/.config/hypr/env.conf


##############
#  MONITORS  #
##############

# See https://wiki.hyprland.org/Configuring/Monitors/

monitor=,preferred,auto,1


#################
#  MY PROGRAMS  #
#################

# Set programs that you use
$terminal = kitty
# $terminal = ghostty
# $terminal = ghostty +new-window # Use D-bus to open new window (fast)
$fileManager = dolphin
$menu = fuzzel
# $menu = wofi --show drun
# $menu = hyprlauncher
# $menu = rofi -show run
$notify = swaync-client -t -sw

# Default audio sink
$defaultSink = @DEFAULT_AUDIO_SINK@


###############
#  AUTOSTART  #
###############

# Autostart necessary processes (like notifications daemons, status bars, etc.)

exec-once = hyprpaper & waybar & swaync & hypridle
exec-once = $terminal


###########################
#  ENVIRONMENT VARIABLES  #
###########################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


###################
#  LOOK AND FEEL  #
###################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
  gaps_in = 5
  gaps_out = 10

  border_size = 2

  # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
  col.active_border = $teal
  col.inactive_border = $comment

  # Set to true enable resizing windows by clicking and dragging on borders and gaps
  resize_on_border = false

  # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
  allow_tearing = false

  layout = scrolling
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
  rounding = 10
  rounding_power = 2

  # Change transparency of focused and unfocused windows
  active_opacity = 1.0
  # inactive_opacity = 0.8

  shadow {
    enabled = false
    range = 4
    render_power = 3
    color = rgba(1a1a1aee)
  }

  # https://wiki.hyprland.org/Configuring/Variables/#blur
  blur {
    enabled = false
    size = 5
  }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
  enabled = yes, please :)

  # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

  bezier = easeOutQuint,0.23,1,0.32,1
  bezier = easeInOutCubic,0.65,0.05,0.36,1
  bezier = linear,0,0,1,1
  bezier = almostLinear,0.5,0.5,0.75,1.0
  bezier = quick,0.15,0,0.1,1

  animation = global, 1, 10, default
  animation = border, 1, 5.39, easeOutQuint

  animation = windows, 1, 4.79, easeOutQuint
  animation = windowsIn, 1, 4.1, easeOutQuint, slide
  animation = windowsOut, 1, 1.49, linear, slide

  animation = fadeIn, 1, 1.73, almostLinear
  animation = fadeOut, 1, 1.46, almostLinear
  animation = fade, 1, 3.03, quick

  animation = layers, 1, 3.81, easeOutQuint
  animation = layersIn, 1, 4, easeOutQuint, fade
  animation = layersOut, 1, 1.5, linear, fade
  animation = fadeLayersIn, 1, 1.79, almostLinear
  animation = fadeLayersOut, 1, 1.39, almostLinear

  
  bezier = workspaceAnim, 0.25, 1, 0.5, 1
  animation = workspaces, 1, 1.94, easeInOutCubic, slidevert
}

# # Ref https://wiki.hyprland.org/Configuring/Workspace-Rules/
# # "Smart gaps" / "No gaps when only"
# # uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrule = rounding 0, floating:0, onworkspace:w[tv1]
# windowrule = bordersize 0, floating:0, onworkspace:f[1]
# windowrule = rounding 0, floating:0, onworkspace:f[1]

############
#  Layout  #
############

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
  pseudotile = true # Master switch for pseudotiling. Enabling is bound to SUPER + P in the keybinds section below
  preserve_split = true # You probably want this
  force_split = 2
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
  new_status = master
}

# https://wiki.hypr.land/Configuring/Scrolling-Layout
scrolling {
  column_width = 1.0
  # # NOTE: The below settings require version > 0.54
  # wrap_focus = false
  # wrap_swapcol = false
}


# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
  disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
  focus_on_activate = true # Focus an application if I click the notification
}


###########
#  INPUT  #
###########

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
  kb_layout = us
  kb_variant =
  kb_model =
  kb_options =
  kb_rules =
  repeat_delay = 250
  repeat_rate = 33

  follow_mouse = 1

  sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

  touchpad {
    natural_scroll = true
  }
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
gestures {
  # workspace_swipe = true # (Legacy)

  # # Dwindle layout
  # gesture = 3, horizontal, workspace
  # gesture = 4, vertical, fullscreen

  # Scrolling layout
  gesture = 3, vertical, workspace
  gesture = 3, left, dispatcher, movefocus, r
  gesture = 3, right, dispatcher, movefocus, l
  gesture = 4, vertical, fullscreen
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
  name = epic-mouse-v1
  sensitivity = -0.5
}

cursor {
  hide_on_key_press = true
}

# Don't scale on xwayland
xwayland {
  force_zero_scaling = true
}

#################
#  KEYBINDINGS  #
#################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
# Launcher
bind = SUPER, space, exec, $menu
# Emoji Picker
# bind = SUPER, comma, exec, bemoji -t 
# Terminal
bind = ALT, return, exec, $terminal
bind = ALT SHIFT, return, exec, "$terminal --class=floatingterm"
# File manager
bind = SUPER, E, exec, $fileManager
# Exit window
bind = ALT SHIFT, Q, killactive,
# Exit hyprland
bind = SUPER, M, exit,
# Floating windows
bind = SUPER, T, togglefloating,
# Screenshots
bind = SUPER SHIFT, S, exec, hyprshot -m region
bind = SUPER SHIFT, W, exec, hyprshot -m window
bind = SUPER SHIFT, M, exec, hyprshot -m output
# Lock Screen
bind = SUPER SHIFT, L, exec, hyprlock
# Open nofification center 
bind = SUPER, N, exec, $notify
# Color picker
bind = SUPER, C, exec, hyprpicker -a -f hex 

###################
#  DWINDLE BINDS  #
###################

# # Focus windows
# bind = $altMod, h, movefocus, l
# bind = $altMod, j, movefocus, r
# bind = $altMod, k, movefocus, u
# bind = $altMod, l, movefocus, d

# # Extra window management
# bind = SUPER, P, pseudo,
# bind = SUPER SHIFT, J, togglesplit,
# bind = SUPER, S, swapsplit

#####################
#  SCROLLING BINDS  #
#####################

# Move focus with mainMod + arrow keys
bind = ALT, h, layoutmsg, focus l
bind = ALT, j, workspace, e-1
bind = ALT, k, workspace, e+1
bind = ALT, l, layoutmsg, focus r

# Swap workspaces in scrolling
bind = ALT SHIFT, h, layoutmsg, swapcol l
bind = ALT SHIFT, l, layoutmsg, swapcol r

# Resize window
bind = SUPER, H, layoutmsg, colresize -0.1
bind = SUPER, L, layoutmsg, colresize +0.1
bind = SUPER, F, layoutmsg, colresize 1.0

#####################
#  WORKSPACE BINDS  #
#####################

# Switch workspaces with mainMod + [0-9]
bind = ALT, 1, workspace, 1
bind = ALT, 2, workspace, 2
bind = ALT, 3, workspace, 3
bind = ALT, 4, workspace, 4
bind = ALT, 5, workspace, 5
bind = ALT, 6, workspace, 6
bind = ALT, 7, workspace, 7
bind = ALT, 8, workspace, 8
bind = ALT, 9, workspace, 9
bind = ALT, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = ALT SHIFT, 1, movetoworkspace, 1
bind = ALT SHIFT, 2, movetoworkspace, 2
bind = ALT SHIFT, 3, movetoworkspace, 3
bind = ALT SHIFT, 4, movetoworkspace, 4
bind = ALT SHIFT, 5, movetoworkspace, 5
bind = ALT SHIFT, 6, movetoworkspace, 6
bind = ALT SHIFT, 7, movetoworkspace, 7
bind = ALT SHIFT, 8, movetoworkspace, 8
bind = ALT SHIFT, 9, movetoworkspace, 9
bind = ALT SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = SUPER, return, togglespecialworkspace, magic
bind = SUPER SHIFT, return, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = SUPER, mouse:272, movewindow
bindm = SUPER SHIFT, mouse:272, resizewindow 2

#######################
#  SPECIAL KEY BINDS  #
#######################

# Device I/O controls (wpctl)
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume $defaultSink 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume $defaultSink 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute $defaultSink toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Screen brightness (brightnessctl)
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 5%-

# Requires playerc
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


################################
#  WINDOW AND WORKSPACE RULES  #
################################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Floating window terminal
# windowrule = float,class:floatingterm
windowrule {
  name = floating-terminal
  match:class = floatingterm
  float = yes
}

# Ignore maximize requests from apps. You'll probably like this.
# windowrule = suppressevent maximize, class:.*
windowrule {
  name = suppress-maximize-events
  match:class = .*

  suppress_event = maximize
}

# Fix some dragging issues with XWayland
# windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
windowrule {
  # Fix some dragging issues with XWayland
  name = fix-xwayland-drags
  match:class = ^$
  match:title = ^$
  match:xwayland = true
  match:float = true
  match:fullscreen = false
  match:pin = false

  no_focus = true
}

