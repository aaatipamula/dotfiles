# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true
right_format = '$cmd_duration'
palette = 'tokyonight_night'

[directory]
style = 'bold fg:blue'
format = '[$path ]($style)'
truncation_length = 3
truncation_symbol = '…/'
truncate_to_repo = false

[directory.substitutions]
'Documents' = '󰈙'
'Downloads' = ' '
'Music' = ' '
'Pictures' = ' '

[git_branch]
style = 'fg:green'
symbol = ' '
format = '[on](white) [$symbol$branch ]($style)'

# ── Git Status ──────────────────────────────────────────────────
# Shows icons for each state; counts are colored individually.
[git_status]
format = '[\[](bold white)$ahead_behind$all_status[\]](bold white)'

# ahead / behind use the $count variable injected by git_metrics instead;
# here we keep symbols only (counts come from git_metrics below)
ahead  = "[⇡$count](bold green)"
behind = "[⇣$count](bold red)"
diverged = "[⇡$ahead_count](bold green)[⇣$behind_count](bold red)"

staged = "[+$count](bold green)"
modified = "[!$count](bold blue)"
untracked = "[?$count](bold yellow)"
renamed = "[»$count](bold cyan)"
deleted = "[✘$count](bold red)"
stashed = "[󰏗$count](bold orange)"
conflicted = "[=$count](bold bright-red)"

[fill]
symbol = ' '

[python]
style = 'blue'
symbol = ' '
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
pyenv_version_name = true
pyenv_prefix = ''

[lua]
format = '[$symbol($version )]($style)'
symbol = ' '

[nodejs]
style = 'green'
symbol = ' '

[golang]
style = 'blue'
symbol = ' '

[haskell]
style = 'purple'
symbol = ' '

[rust]
style = 'red'
symbol = ' '

[package]
style = 'blue6'
symbol = '󰏗 '

[docker_context]
symbol = ' '
style = 'fg:#06969A'
format = '[$symbol]($style) $path'
detect_files = ['docker-compose.yml', 'docker-compose.yaml', 'Dockerfile']
detect_extensions = ['Dockerfile']

[jobs]
symbol = ' '
style = 'red'
number_threshold = 1
format = '[$symbol]($style)'

[cmd_duration]
min_time = 500
style = 'fg:yellow'
format = '[$duration]($style)'

[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold yellow)"

